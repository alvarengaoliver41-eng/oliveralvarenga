    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Almarai', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #06141B;
      color: #E1E0CC;

    /* ── Ambient background canvas ── */
    #ambient-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(120px); opacity: 0;
      transition: opacity 2s ease, transform 3s ease;
    }
    .orb-1 {
      width: 70vw; height: 70vw;
      top: -20%; left: -20%;
      background: radial-gradient(circle, #253745 0%, transparent 70%);
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 55vw; height: 55vw;
      top: 30%; right: -15%;
      background: radial-gradient(circle, #11212D 0%, transparent 70%);
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 60vw; height: 60vw;
      bottom: -10%; left: 15%;
      background: radial-gradient(circle, #253745 0%, transparent 70%);
      animation: drift3 26s ease-in-out infinite alternate;
    }
    .orb-4 {
      width: 40vw; height: 40vw;
      top: 60%; left: 40%;
      background: radial-gradient(circle, #4A5C6A 0%, transparent 70%);
      opacity: 0;
      animation: drift4 20s ease-in-out infinite alternate;
    }
    .orbs-visible .orb { opacity: 1 !important; }

    @keyframes drift1 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(8vw, 12vh) scale(1.15); }
    }
    @keyframes drift2 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-10vw, -8vh) scale(0.9); }
    }
    @keyframes drift3 {
      0%   { transform: translate(0, 0) scale(1.05); }
      100% { transform: translate(6vw, -14vh) scale(1.2); }
    }
    @keyframes drift4 {
      0%   { transform: translate(0, 0) scale(1); opacity: 0; }
      50%  { opacity: 0.6; }
      100% { transform: translate(-8vw, 10vh) scale(1.1); opacity: 0.3; }

    /* Section divider glows */
    .section-glow {
      position: relative;
    }
    .section-glow::after {
      content: '';

      height: 1px;
      background: linear-gradient(to right, transparent 0%, #4A5C6A 30%, #9BA8AB 50%, #4A5C6A 70%, transparent 100%);

      transition: opacity 1.5s ease;

    /* Page wrapper above ambient */

    .reveal {

      transform: translateY(24px);

      will-change: opacity, transform;

    .reveal.visible { opacity: 1; transform: translateY(0); will-change: auto; }

    /* word pull-up */
    .word-wrap { display: inline-block; overflow: hidden; vertical-align: bottom; }
    .word-inner {
      display: inline-block;
      transform: translateY(105%);
      opacity: 0;
      transition: transform 0.65s cubic-bezier(0.16,1,0.3,1), opacity 0.65s cubic-bezier(0.16,1,0.3,1);

const { useRef, useState, useEffect } = React;

/* ─── useReveal hook ────────────────────────────────────────────── */
function useReveal(options = {}) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {setVisible(true);obs.disconnect();}
    }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px', ...options });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

/* ─── WordsPullUp ──────────────────────────────────────────────── */
function WordsPullUp({ text, className = '', baseDelay = 0, startVisible = false }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(startVisible);
  useEffect(() => {
    if (startVisible) return;
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {setVisible(true);obs.disconnect();}
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    obs.observe(el);
    return () => obs.disconnect();
  }, [startVisible]);

  const words = text.split(' ');
  return (
    <span ref={ref} className={visible ? 'pull-visible' : ''} style={{ display: 'inline' }}>
          {words.map((word, i) =>
      <span key={i} className="word-wrap">
              <span
          className="word-inner"
          style={{ transitionDelay: `${baseDelay + i * 0.06}s` }}>
          
                {word}{i < words.length - 1 ? '\u00A0' : ''}
              </span>
            </span>
      )}
        </span>);

}

/* ─── CheckItem ────────────────────────────────────────────────── */

            </svg>
          </span>
          <span style={{ fontSize: 13, color: '#9BA8AB', fontWeight: 300 }}>{text}</span>
        </div>);

}

}
function AboutLine({ line, baseDelay, parentVisible }) {
  let ci = 0;
  return (
    <span className={parentVisible ? 'pull-visible' : ''} style={{ display: 'inline' }}>
      {line.parts.map((part, pi) => {
        const words = part.text.split(' ');
        return words.map((word, wi) => {
          const wordEl = (
            <React.Fragment key={`${pi}-${wi}`}>
              <span style={{ display: 'inline-block', whiteSpace: 'nowrap' }}>
                {word.split('').map((ch, li) => {
                  const delay = baseDelay + ci * 0.012;
                  ci++;
                  return (
                    <span key={li} className="word-wrap">
                      <span className="word-inner" style={{
                        fontStyle: part.italic ? 'italic' : 'normal',
                        fontFamily: part.italic ? '"Instrument Serif", serif' : undefined,
                        transitionDelay: `${delay}s`
                      }}>{ch}</span>
                    </span>
                  );
                })}
              </span>
              {(wi < words.length - 1 || pi < line.parts.length - 1) && '\u00A0'}
            </React.Fragment>
          );
          ci++;
          return wordEl;
        });
      })}
    </span>
  );
}

            © 2026 Oliver Alvarenga.
          </span>
          <span style={{ fontSize: 11, color: '#4A5C6A', letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 700 }}>BUILT DIFFERENT

      </span>
        </footer>);

}

/* ─── APP ──────────────────────────────────────────────────────── */
function App() {
  useEffect(() => {
    setTimeout(() => {
      const bg = document.getElementById('ambient-bg');
      if (bg) bg.classList.add('orbs-visible');
    }, 300);
    const sections = document.querySelectorAll('.section-glow');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {if (e.isIntersecting) e.target.classList.add('glow-visible');});
    }, { threshold: 0.85 });
    sections.forEach((s) => obs.observe(s));
    return () => obs.disconnect();
  }, []);
  return (
    <div id="page">
      <Hero />
      <div className="section-glow" style={{ marginTop: 0 }}><About /></div>
      <div className="section-glow"><Features /></div>
      <div className="section-glow"><Contact /></div>
      <Footer />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
